services:
  - type: web
    name: hadi-perfumes-api
    env: node
    plan: starter # Starter plan prevents automatic spinning down, saving Cron execution.
    region: singapore # Matches proximity to India if chosen, or switch to your preferred region
    buildCommand: "npm ci && npm run build"
    startCommand: "npm run start:prod"
    autoDeploy: true # Will automatically deploy from connected Github branch
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000

      # Database Configuration (Supabase Pooler)
      # Ensure you get the connection string with port 6543 and add ?pgbouncer=true
      - key: DATABASE_URL 
        sync: false

      # Queue Storage (Upstash Redis)
      - key: REDIS_URL
        sync: false

      # Application Secrets
      - key: JWT_SECRET
        generateValue: true

      # Stripe Configurations
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

      # Limits
      - key: MAX_ACCOUNTS_PER_DEVICE
        value: "3"
      - key: MAX_OTP_FAILURES_PER_HOUR
        value: "10"
      - key: MAX_ORDERS_PER_HOUR
        value: "5"
